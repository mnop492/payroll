{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-6">
    <div class="card app-card">
      <div class="card-header bg-primary text-white">簡易登入</div>
      <div class="card-body">
        <form method="POST">
          <input type="hidden" name="next" value="{{ next_url }}">
          <div class="mb-3">
            <label class="form-label">使用者名稱</label>
            <input class="form-control" name="user" placeholder="輸入使用者名稱" autocomplete="username" required>
          </div>
          <div class="mb-3">
            <label class="form-label">密碼</label>
            <input type="password" class="form-control" name="password" placeholder="輸入密碼" autocomplete="current-password" required>
          </div>
          <div class="text-end">
            <button class="btn btn-primary">登入</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
