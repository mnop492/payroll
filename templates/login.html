{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-header bg-primary text-white">簡易登入</div>
      <div class="card-body">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">使用者名稱</label>
            <input class="form-control" name="user" placeholder="輸入名稱，會顯示在稽核紀錄中">
          </div>
          <div class="mb-3">
            <label class="form-label">管理員密碼（如需查看稽核紀錄）</label>
            <input type="password" class="form-control" name="password" placeholder="若無請留空">
          </div>
          <div class="text-end">
            <button class="btn btn-primary">登入</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
