{% extends 'base.html' %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
  <div class="w-full max-w-md">
    <div class="bg-slate-800 rounded-2xl shadow-sm border border-slate-700 overflow-hidden">
      <div class="px-6 py-4 bg-blue-600 text-slate-100 font-bold text-lg">🔐 簡易登入</div>
      <div class="p-6 space-y-4">
        <form method="POST">
          <input type="hidden" name="next" value="{{ next_url }}">
          <div class="space-y-1">
            <label class="text-sm font-medium text-slate-200">使用者名稱</label>
            <input class="text-slate-200 bg-slate-800 w-full px-3 py-2.5 border border-slate-600 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow" name="user" placeholder="輸入使用者名稱" autocomplete="username" required>
          </div>
          <div class="space-y-1 mt-4">
            <label class="text-sm font-medium text-slate-200">密碼</label>
            <input type="password" class="text-slate-200 bg-slate-800 w-full px-3 py-2.5 border border-slate-600 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow" name="password" placeholder="輸入密碼" autocomplete="current-password" required>
          </div>
          <div class="text-right mt-6">
            <button class="px-6 py-2.5 bg-blue-600 text-slate-100 font-semibold rounded-xl hover:bg-blue-700 shadow-sm transition-colors">登入</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
