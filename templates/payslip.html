<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>{{ emp['員工'] }} - {{ current_brand_name }} Payslip</title>
    <style>
        @page { size: A4; margin: 0; }
        body { font-family: 'Arial', '微軟正黑體', sans-serif; background-color: #525659; margin: 0; padding: 0; }
        .a4-page { width: 210mm; min-height: 297mm; padding: 20mm; margin: 20px auto; background: white; box-shadow: 0 0 10px rgba(0,0,0,0.5); box-sizing: border-box; position: relative; }
        .header-section { display: flex; align-items: flex-start; margin-bottom: 20px; }
        .logo-box { width: 80px; height: 80px; margin-right: 15px; }
        .logo-box img { width: 100%; height: auto; }
        .company-info { flex-grow: 1; }
        .company-name { font-weight: bold; font-size: 22px; color: #000; }
        .company-addr { font-size: 11px; line-height: 1.3; margin-top: 5px; }
        .doc-title { text-align: center; font-size: 18px; font-weight: bold; text-decoration: underline; margin: 25px 0; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 25px; table-layout: fixed; }
        th, td { border: 1px solid #000; padding: 8px 12px; font-size: 14px; }
        .bg-grey { background-color: #E7E6E6; }
        .text-bold { font-weight: bold; }
        .sig-container { margin-top: 60px; display: flex; justify-content: space-between; font-size: 14px; }
        .sig-line { border-bottom: 1px solid #000; display: inline-block; width: 220px; margin-left: 5px; }
        @media print { body { background: none; } .a4-page { margin: 0; box-shadow: none; width: 100%; } .no-print { display: none; } }
    </style>
</head>
<body>
    <div class="no-print" style="text-align:center; padding: 10px;">
        <button onclick="window.print()" style="padding:10px 20px; cursor:pointer; font-weight:bold; background:#007bff; color:white; border:none; border-radius:4px;">🖨️ 列印此單</button>
        <a href="/?month={{ month }}&brand={{ current_brand }}" style="color:white; margin-left:15px; text-decoration:none;">← 返回主控台</a>
    </div>

    {% include '_payslip_content.html' %}
</body>
</html>
