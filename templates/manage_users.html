{% extends 'base.html' %}

{% block content %}
<div class="space-y-6">
  <h2 class="text-2xl font-bold text-gray-800">👥 使用者管理</h2>

  <div class="bg-white rounded-2xl shadow-sm border border-blue-200 overflow-hidden">
    <div class="px-5 py-3.5 bg-blue-600 text-white font-bold">新增使用者</div>
    <div class="p-5">
      <form action="/add_user" method="POST" class="flex flex-wrap gap-3 items-end">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">使用者名稱</label>
          <input name="username" class="px-3 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" required>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">初始密碼</label>
          <input type="password" name="password" class="px-3 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" required>
        </div>
        <div class="flex items-center gap-2 pb-1">
          <input type="checkbox" id="new_is_admin" name="is_admin" class="w-4 h-4 text-blue-600 rounded focus:ring-blue-500">
          <label for="new_is_admin" class="text-sm font-medium text-gray-700">Admin</label>
        </div>
        <button class="px-5 py-2 bg-green-600 text-white font-semibold rounded-xl hover:bg-green-700 transition-colors">新增</button>
      </form>
    </div>
  </div>

  <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
    <div class="px-5 py-3.5 bg-gray-800 text-white font-bold">既有使用者</div>
    <div class="overflow-x-auto">
      <table class="w-full text-sm border-collapse">
        <thead>
          <tr class="bg-gray-100 text-center text-xs font-semibold text-gray-600 uppercase tracking-wider">
            <th class="px-4 py-3 border-b border-gray-200">使用者</th>
            <th class="px-4 py-3 border-b border-gray-200">Admin</th>
            <th class="px-4 py-3 border-b border-gray-200">品牌授權</th>
            <th class="px-4 py-3 border-b border-gray-200">啟用</th>
            <th class="px-4 py-3 border-b border-gray-200">建立時間</th>
            <th class="px-4 py-3 border-b border-gray-200">更新時間</th>
            <th class="px-4 py-3 border-b border-gray-200">更新密碼</th>
            <th class="px-4 py-3 border-b border-gray-200">刪除</th>
          </tr>
        </thead>
        <tbody>
          {% for u in users %}
          <tr class="text-center border-b border-gray-100 hover:bg-gray-50 even:bg-gray-50/50 transition-colors">
            <td class="px-4 py-3 font-bold">{{ u.username }}</td>
            <td class="px-4 py-3">
              <form action="/update_user_role" method="POST" class="flex gap-2 items-center justify-center">
                <input type="hidden" name="id" value="{{ u.id }}">
                <input type="checkbox" name="is_admin" {% if u.is_admin %}checked{% endif %} class="w-4 h-4 text-blue-600 rounded focus:ring-blue-500">
                <button class="px-2.5 py-1 text-xs font-semibold text-blue-600 border border-blue-300 rounded-lg hover:bg-blue-50 transition-colors">儲存</button>
              </form>
            </td>
            <td class="px-4 py-3 text-left max-w-xs">
              <form action="/update_user_brands" method="POST" class="space-y-2">
                <input type="hidden" name="id" value="{{ u.id }}">
                <div class="flex flex-wrap gap-1.5">
                  {% for b in available_brands %}
                  <label class="text-xs border border-gray-200 rounded-lg px-2 py-1 cursor-pointer hover:bg-gray-50">
                    <input type="checkbox" name="brand_codes" value="{{ b.brand_code }}" {% if b.brand_code in user_brand_map.get(u.username, []) %}checked{% endif %} class="w-3 h-3 text-blue-600 rounded focus:ring-blue-500 me-1">{{ b.brand_name }}
                  </label>
                  {% endfor %}
                </div>
                <button class="px-2.5 py-1 text-xs font-semibold text-green-700 border border-green-300 rounded-lg hover:bg-green-50 transition-colors">儲存授權</button>
              </form>
            </td>
            <td class="px-4 py-3">
              <form action="/update_user_status" method="POST" class="flex gap-2 items-center justify-center">
                <input type="hidden" name="id" value="{{ u.id }}">
                <input type="checkbox" name="is_active" {% if u.is_active %}checked{% endif %} class="w-4 h-4 text-blue-600 rounded focus:ring-blue-500">
                <button class="px-2.5 py-1 text-xs font-semibold text-gray-600 border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">儲存</button>
              </form>
            </td>
            <td class="px-4 py-3 text-xs text-gray-400 whitespace-nowrap">{{ u.created_at or '' }}</td>
            <td class="px-4 py-3 text-xs text-gray-400 whitespace-nowrap">{{ u.updated_at or '' }}</td>
            <td class="px-4 py-3">
              <form action="/update_user_password" method="POST" class="flex gap-1">
                <input type="hidden" name="id" value="{{ u.id }}">
                <input type="password" name="new_password" class="w-24 px-2 py-1 text-xs border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="新密碼" required>
                <button class="px-2 py-1 text-xs font-semibold text-amber-700 bg-amber-100 rounded-lg hover:bg-amber-200 transition-colors">更新</button>
              </form>
            </td>
            <td class="px-4 py-3">
              <a href="/delete_user/{{ u.id }}" class="px-2.5 py-1 text-xs font-semibold text-red-600 border border-red-300 rounded-lg hover:bg-red-50 transition-colors" onclick="return confirm('確定刪除此使用者？')">刪除</a>
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}
